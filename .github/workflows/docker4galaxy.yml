name: Build Custom Containers and Update XML (if Dockerfile changes)

on:
  push:
    branches: [ main ]
    paths:
      - 'tools/**'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-patch:
    name: Build Container and Patch XML
    runs-on: ubuntu-latest
    steps:
      # --- Steps 1-4 are unchanged ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GALAXYTRAKR_PAT }}
          fetch-depth: 2
      - name: Authenticate to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWORD }}
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Detect Changes and Determine Build Strategy
        id: build_logic
        run: |
          # This logic remains correct.
          echo "Detecting changed files in the last commit..."
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)
          if echo "$CHANGED_FILES" | grep -q "Dockerfile"; then
            echo "Dockerfile change detected. A rebuild is required."
            DIRS_TO_BUILD=$(echo "$CHANGED_FILES" | grep "Dockerfile" | sed -E 's|^(tools/[^/]+)/.*|\1|' | sort -u)
            echo "build_required=true" >> $GITHUB_OUTPUT
            echo "tool_dirs=${DIRS_TO_BUILD}" >> $GITHUB_OUTPUT
          else
            echo "No Dockerfile changes detected. Build not required."
            echo "build_required=false" >> $GITHUB_OUTPUT
          fi
          
      # --- Step 5 is now even smarter ---
      - name: Build, Push, and Patch
        if: steps.build_logic.outputs.build_required == 'true'
        run: |
          set -e
          echo "Starting build and patch process..."
          for tool_dir in ${{ steps.build_logic.outputs.tool_dirs }}; do
            [ -z "$tool_dir" ] && continue
            
            TOOL_NAME=$(basename "$tool_dir")
            echo "=================================================="
            echo "Processing repository: ${TOOL_NAME}"
            echo "=================================================="

            INNER_TOOL_DIR="${tool_dir}/${TOOL_NAME}"
            DOCKERFILE_PATH="${INNER_TOOL_DIR}/Dockerfile"
            SHED_FILE_PATH="${INNER_TOOL_DIR}/.shed.yml"
            BUILD_CONTEXT="${INNER_TOOL_DIR}"

            # --- External Source Logic with Versioning ---
            if [ -f "$SHED_FILE_PATH" ] && grep -q "build_source_url:" "$SHED_FILE_PATH"; then
              GIT_URL=$(grep "build_source_url:" "$SHED_FILE_PATH" | awk '{print $2}')
              CLONE_DIR="${INNER_TOOL_DIR}/source_repo"
              
              # Check for the new version field.
              if grep -q "build_source_version:" "$SHED_FILE_PATH"; then
                GIT_VERSION=$(grep "build_source_version:" "$SHED_FILE_PATH" | awk '{print $2}')
                echo "External source URL found: ${GIT_URL} at version ${GIT_VERSION}"
                # Use the specific clone command you provided.
                git clone -b "${GIT_VERSION}" --depth 1 "${GIT_URL}" "${CLONE_DIR}"
              else
                echo "External source URL found: ${GIT_URL} (cloning default branch)"
                git clone "${GIT_URL}" "${CLONE_DIR}"
              fi
              
              BUILD_CONTEXT="${CLONE_DIR}"
            fi

            # --- Build, Push, and Patch logic is now guaranteed to have the right context ---
            IMAGE_NAME="quay.io/galaxytrakr/${TOOL_NAME}"
            UNIQUE_TAG=$(git rev-parse --short HEAD)
            FULL_IMAGE_TAG="${IMAGE_NAME}:${UNIQUE_TAG}"
            
            docker build -t "${FULL_IMAGE_TAG}" -f "${DOCKERFILE_PATH}" "${BUILD_CONTEXT}"
            docker push "${FULL_IMAGE_TAG}"

            echo "Patching XML files in ${INNER_TOOL_DIR}..."
            for TOOL_XML_FILE in ${INNER_TOOL_DIR}/*.xml; do
              if [ -f "$TOOL_XML_FILE" ]; then
                  sed -i -E "s|<container type=\"docker\">.*</container>|<container type=\"docker\">${FULL_IMAGE_TAG}</container>|" "${TOOL_XML_FILE}"
              fi
            done
          done

      # --- Step 6 is unchanged ---
      - name: Commit and Push Updated XML Files
        if: steps.build_logic.outputs.build_required == 'true'
        run: |
          # ... (commit logic remains the same) ...
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          if ! git diff-index --quiet HEAD; then
            git add tools/
            git commit -m "ci: Update container tags for rebuilt tools"
            git push
          fi
