name: Build Custom Containers and Update XML (if Dockerfile changes)

on:
  push:
    branches: [ main ]
    paths:
      # This workflow runs for any change under the 'tools' directory.
      - 'tools/**'
  workflow_dispatch:

# Grant write permissions for the workflow to commit the patched XML file back.
permissions:
  contents: write

jobs:
  build-and-patch:
    name: Build Container and Patch XML
    runs-on: ubuntu-latest
    steps:
      # --- 1. Checkout repository with a token that can write back ---
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # A Personal Access Token (PAT) with 'repo' scope is required to push commits back.
          token: ${{ secrets.GALAXYTRAKR_PAT }}
          # Fetch last 2 commits to perform a diff.
          fetch-depth: 2

      # --- 2. Authenticate to Quay.io ---
      - name: Authenticate to Quay.io
        uses: docker/login-action@v3
        with:
          registry: quay.io
          username: ${{ secrets.QUAY_USER }}
          password: ${{ secrets.QUAY_PASSWORD }}

      # --- 3. Set up Docker Buildx ---
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- 4. Detect Changes and Determine Build Strategy ---
      - name: Detect Changes and Determine Build Strategy
        id: build_logic
        run: |
          echo "Detecting changed files in the last commit..."
          # Get a list of all files changed between the last two commits.
          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD)

          # Check if any Dockerfile was changed. This is the master switch for this workflow.
          if echo "$CHANGED_FILES" | grep -q "Dockerfile"; then
            echo "Dockerfile change detected. A container rebuild is required."
            
            # This 'sed' command correctly finds the top-level tool directory (e.g., tools/cfsan2snp2)
            # for any changed Dockerfile.
            DIRS_TO_BUILD=$(echo "$CHANGED_FILES" | grep "Dockerfile" | sed -E 's|^(tools/[^/]+)/.*|\1|' | sort -u)
            
            if [ -z "$DIRS_TO_BUILD" ]; then
                echo "::error::Could not determine which directories to build, even though a Dockerfile changed."
                exit 1
            fi
            
            echo "build_required=true" >> $GITHUB_OUTPUT
            echo "The following directories will be rebuilt: $DIRS_TO_BUILD"
            # Pass the list of directories to the next step.
            echo "tool_dirs=${DIRS_TO_BUILD}" >> $GITHUB_OUTPUT
          else
            echo "No Dockerfile changes detected in this commit. Container rebuild is NOT required."
            echo "build_required=false" >> $GITHUB_OUTPUT
            echo "tool_dirs=" >> $GITHUB_OUTPUT
          fi
          
      # --- 5. Build, Push, and Patch (only if a Dockerfile changed) ---
      - name: Build, Push, and Patch
        if: steps.build_logic.outputs.build_required == 'true'
        run: |
          set -e
          echo "Starting build and patch process for directories with changed Dockerfiles..."
          for tool_dir in ${{ steps.build_logic.outputs.tool_dirs }}; do
            [ -z "$tool_dir" ] && continue
            
            TOOL_NAME=$(basename "$tool_dir")
            echo "=================================================="
            echo "Processing repository: ${TOOL_NAME}"
            echo "=================================================="

            INNER_TOOL_DIR="${tool_dir}/${TOOL_NAME}"
            DOCKERFILE_PATH="${INNER_TOOL_DIR}/Dockerfile"
            SHED_FILE_PATH="${INNER_TOOL_DIR}/.shed.yml"
            BUILD_CONTEXT="${INNER_TOOL_DIR}" # Default build context

            # --- External Source Logic ---
            # Check for and use the 'build_source_url' from the .shed.yml file.
            if [ -f "$SHED_FILE_PATH" ] && grep -q "build_source_url:" "$SHED_FILE_PATH"; then
              GIT_URL=$(grep "build_source_url:" "$SHED_FILE_PATH" | awk '{print $2}')
              CLONE_DIR="${INNER_TOOL_DIR}/source_repo"
              
              echo "External source URL found: ${GIT_URL}"
              echo "Cloning source code into ${CLONE_DIR}..."
              git clone "${GIT_URL}" "${CLONE_DIR}"
              
              # Set the build context to the directory we just cloned.
              BUILD_CONTEXT="${CLONE_DIR}"
            else
              echo "No external source URL found. Using tool directory as build context."
            fi

            # --- A. Build and Push ---
            IMAGE_NAME="quay.io/galaxytrakr/${TOOL_NAME}"
            UNIQUE_TAG=$(git rev-parse --short HEAD)
            FULL_IMAGE_TAG="${IMAGE_NAME}:${UNIQUE_TAG}"
            
            echo "Building image: ${FULL_IMAGE_TAG}"
            echo "Using build context: ${BUILD_CONTEXT}"
            docker build -t "${FULL_IMAGE_TAG}" -f "${DOCKERFILE_PATH}" "${BUILD_CONTEXT}"
            docker push "${FULL_IMAGE_TAG}"

            # --- B. Patch XML ---
            echo "Patching all XML files in ${INNER_TOOL_DIR}..."
            for TOOL_XML_FILE in ${INNER_TOOL_DIR}/*.xml; do
              if [ -f "$TOOL_XML_FILE" ]; then
                  sed -i -E "s|<container type=\"docker\">.*</container>|<container type=\"docker\">${FULL_IMAGE_TAG}</container>|" "${TOOL_XML_FILE}"
              fi
            done
          done

      # --- 6. Commit and Push (only if a build happened) ---
      - name: Commit and Push Updated XML Files
        if: steps.build_logic.outputs.build_required == 'true'
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          
          if ! git diff-index --quiet HEAD; then
            echo "Detected patched XML files. Committing and pushing back..."
            git add tools/
            git commit -m "ci: Update container tags for rebuilt tools"
            git push
          else
            echo "No files were patched, nothing to commit."
          fi
